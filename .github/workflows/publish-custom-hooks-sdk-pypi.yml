# Build and upload permiso-custom-hooks-sdk to PyPI.
#
# One-time PyPI setup (org admin or project owner):
# 1. On https://pypi.org/manage/project/permiso-custom-hooks-sdk/settings/publishing/
#    add a Trusted Publisher:
#    - PyPI project: permiso-custom-hooks-sdk
#    - Owner: Permiso-io
#    - Repository: bourne-sdks
#    - Workflow: publish-custom-hooks-sdk-pypi.yml
#    - Workflow environment: leave blank unless you create a GitHub "pypi" environment and want stricter gates.
# 2. For the first release, the project name must be available; the first upload creates the project.
#
# Release: tag this repo with custom-hooks-sdk-py-vX.Y.Z (version must match pyproject.toml) and push the tag.
# Or run this workflow manually from the Actions tab (workflow_dispatch).

name: Publish custom-hooks-sdk (PyPI)

on:
  workflow_dispatch:
  push:
    tags:
      - "custom-hooks-sdk-py-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Trusted publishing (OIDC)

    defaults:
      run:
        working-directory: custom-hooks-sdk-py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: custom-hooks-sdk-py/dist/
